<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple Web Proxy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #01030a;
      color: #e7f0ff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 1rem 1.5rem;
      background: #030716;
      border-bottom: 1px solid #0a1a3a;
      box-shadow: 0 0 15px rgba(45, 158, 255, 0.1);
    }

    h1 {
      margin: 0;
      font-size: 1.3rem;
      color: #4dc3ff;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px rgba(45, 158, 255, 0.8);
    }

    .controls {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #02040a;
      border-bottom: 1px solid #0a1a3a;
      box-shadow: 0 0 10px rgba(45, 158, 255, 0.05);
    }

    .controls input[type="text"] {
      flex: 1;
      padding: 0.45rem 0.6rem;
      border-radius: 4px;
      border: 1px solid #133b74;
      background: #0b1222;
      color: #e7f0ff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .controls input[type="text"]:focus {
      border-color: #2d9eff;
      box-shadow: 0 0 6px rgba(45, 158, 255, 0.5);
    }

    .controls button {
      padding: 0.45rem 1rem;
      border-radius: 4px;
      border: none;
      background: #2d9eff;
      color: #02040a;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 10px rgba(45, 158, 255, 0.4);
    }

    .controls button:hover {
      background: #4db8ff;
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(77, 184, 255, 0.7);
    }

    .status {
      padding: 0 1.5rem 0.5rem;
      font-size: 0.85rem;
      color: #7a91b0;
      text-shadow: 0 0 5px rgba(45, 158, 255, 0.3);
    }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
      background: #0b0f1d;
      box-shadow: inset 0 0 20px rgba(45, 158, 255, 0.1);
    }
  </style>
</head>
<body>
  <header>
    <h1>HTML Proxy Front-end</h1>
  </header>

  <div class="controls">
    <input
      id="urlInput"
      type="text"
      placeholder="Enter URL (https://example.com)"
    />
    <button id="goBtn">Go</button>
  </div>

  <div class="status" id="statusText">
    Enter a URL and click Go to load it through your proxy.
  </div>

  <iframe id="viewFrame" src="about:blank"></iframe>

  <script>
    const urlInput = document.getElementById("urlInput");
    const goBtn = document.getElementById("goBtn");
    const statusText = document.getElementById("statusText");
    const viewFrame = document.getElementById("viewFrame");

    function normalizeUrl(url) {
      url = url.trim();
      if (!url) return "";
      if (!/^https?:\\/\\//i.test(url)) {
        url = "https://" + url;
      }
      return url;
    }

    function loadThroughProxy() {
      const raw = urlInput.value;
      const target = normalizeUrl(raw);
      if (!target) {
        statusText.textContent = "Please enter a URL.";
        return;
      }

      const proxied = "/proxy?url=" + encodeURIComponent(target);
      statusText.textContent = "Loading " + target + " through /proxy ...";
      viewFrame.src = proxied;
    }

    goBtn.addEventListener("click", loadThroughProxy);
    urlInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        loadThroughProxy();
      }
    });
  </script>
</body>
</html>
